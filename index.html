<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Stats Pro</title>
    <link rel="stylesheet" href="design.css">
    <script src="data.js"></script>
</head>
<body>
    <script>
        // Проверяем авторизацию
        const activeEmail = localStorage.getItem('football_tracker_pro_v4_active_email');
        
        if (activeEmail && window.AppData && window.AppData.usersDatabase && window.AppData.usersDatabase[activeEmail]) {
            // Пользователь авторизован, идём на главную
            window.location.href = 'clubs.html';
        } else {
            // Не авторизован, показываем логин
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
